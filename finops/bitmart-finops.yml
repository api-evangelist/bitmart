providerId: bitmart
created: '2026-06-13'
modified: '2026-06-13'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - Cryptocurrency
  - Exchange
  - Trading
description: 'FOCUS-aligned FinOps for BitMart: API connectivity is free; cost is incurred as
  per-transaction maker/taker take rates structured around 12 VIP tiers based on BMX token holdings.
  New API users receive a 30-day VIP3 trial with 0% spot trading fees. Futures and margin trading
  carry separate fee schedules. BMX token payment provides a 25% discount on standard fee tiers
  but is not combinable with the API VIP program enrollment.'
sources:
  - https://bitmart.zendesk.com/hc/en-us/articles/4642859293979-BitMart-API-Users-VIP-Program
  - https://developer-pro.bitmart.com/en/spot/
  - https://developer-pro.bitmart.com/en/futuresv2/
