meters:
  - name: spot_trades
    unit: transaction
    aggregation: sum
    dimensions:
      - symbol
      - pair_class
      - side
      - maker_or_taker
      - vip_tier
  - name: spot_volume
    unit: USD
    aggregation: sum
    dimensions:
      - symbol
      - pair_class
      - vip_tier
  - name: futures_trades
    unit: transaction
    aggregation: sum
    dimensions:
      - contract
      - side
      - maker_or_taker
      - vip_tier
  - name: futures_volume
    unit: USD
    aggregation: sum
    dimensions:
      - contract
      - vip_tier
  - name: margin_trades
    unit: transaction
    aggregation: sum
    dimensions:
      - symbol
      - side
      - maker_or_taker
  - name: margin_interest
    unit: USD
    aggregation: sum
    dimensions:
      - currency
      - borrow_duration
  - name: bmx_fee_payments
    unit: BMX
    aggregation: sum
    dimensions:
      - product
  - name: api_requests
    unit: request
    aggregation: sum
    dimensions:
      - api
      - endpoint
      - scope
principles:
  - name: Visibility
    description: Retrieve trade and fee detail via the spot trade query endpoints (/spot/v4/query/trades)
      and futures position history. Reconcile against account wallet balance changes and deposit/withdrawal
      history from /account/v2/deposit-withdraw/history.
  - name: Allocation
    description: Use sub-account management endpoints to segregate trading activity and fees by strategy,
      desk, or client. Inter-account transfers allow asset movement between sub-accounts for consolidated
      reporting of realized costs.
  - name: Optimization
    description: Pursue higher BMX token holdings to qualify for lower VIP tier maker/taker fees.
      New API integrations should leverage the free 30-day VIP3 trial for cost modeling. Prefer
      maker-side liquidity where possible to minimize taker fee exposure. Evaluate BMX fee payment
      discount (25%) against current BMX price and holding cost for standard tier accounts.
  - name: Accountability
    description: Assign API key ownership per strategy or team. Monitor X-BM-RateLimit headers to
      avoid 429 throttling costs (retry overhead). Alert on per-tier fee threshold changes following
      BMX balance fluctuations that may cause tier downgrade. Reconcile USDT PnL against on-chain
      settlements and withdrawal records.
maintainers:
