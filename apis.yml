apis:
  - aid: bitmart:spot-trading-api
    name: BitMart Spot Trading API
    tags:
      - Cryptocurrency
      - Exchange
      - Market Data
      - Spot
      - Trading
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api-cloud.bitmart.com
    humanURL: https://developer-pro.bitmart.com/en/spot/
    properties:
      - url: https://developer-pro.bitmart.com/en/spot/
        type: Documentation
    description: >-
      The BitMart Spot Trading REST API provides programmatic access to spot trading on the BitMart
      global cryptocurrency exchange. Developers can place and manage limit, market, and algorithmic
      orders, query real-time and historical market data including tickers, order books, klines and
      trades, manage account balances, and access trading fee information. Authentication uses
      HMAC-SHA256 signed requests with API key, secret, and memo credentials. Public endpoints are
      accessible without authentication while trading and account endpoints require KEYED or SIGNED
      access.
  - aid: bitmart:spot-websocket-api
    name: BitMart Spot WebSocket API
    tags:
      - Cryptocurrency
      - Market Data
      - Real-Time
      - Streaming
      - WebSocket
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: wss://ws-manager-compress.bitmart.com
    humanURL: https://developer-pro.bitmart.com/en/spot/
    properties:
      - url: https://developer-pro.bitmart.com/en/spot/
        type: Documentation
    description: >-
      The BitMart Spot WebSocket API delivers real-time streaming market data and private account
      updates via persistent WebSocket connections. Public channels include ticker prices, order book
      depth, trade history, and kline candlestick data. Private channels provide real-time order
      status updates and account asset changes. The public endpoint is at
      wss://ws-manager-compress.bitmart.com/api and the private endpoint at
      wss://ws-manager-compress.bitmart.com/user. Each IP can maintain up to 20 public and 10 private
      connections simultaneously.
  - aid: bitmart:futures-trading-api
    name: BitMart Futures Trading API
    tags:
      - Cryptocurrency
      - Derivatives
      - Futures
      - Perpetual
      - Trading
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api-cloud-v2.bitmart.com
    humanURL: https://developer-pro.bitmart.com/en/futuresv2/
    properties:
      - url: https://developer-pro.bitmart.com/en/futuresv2/
        type: Documentation
    description: >-
      The BitMart Futures Trading REST API enables trading of perpetual futures contracts on the
      BitMart derivatives platform. Developers can submit and cancel orders including plan orders,
      take-profit and stop-loss orders, and trailing stop orders. The API provides endpoints for
      querying contract details, market depth, open interest, funding rates, klines, and leveraged
      position data. A simulated trading environment is available at demo-api-cloud-v2.bitmart.com
      for strategy testing without risking capital.
  - aid: bitmart:futures-websocket-api
    name: BitMart Futures WebSocket API
    tags:
      - Cryptocurrency
      - Derivatives
      - Futures
      - Real-Time
      - Streaming
      - WebSocket
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: wss://openapi-ws-v2.bitmart.com
    humanURL: https://developer-pro.bitmart.com/en/futuresv2/
    properties:
      - url: https://developer-pro.bitmart.com/en/futuresv2/
        type: Documentation
    description: >-
      The BitMart Futures WebSocket API streams real-time derivatives market data and account updates
      through persistent WebSocket connections. Public channels include depth snapshots and incremental
      updates, trades, klines, mark price, and funding rate data. Private channels provide real-time
      position, asset, and order event streams. The public endpoint is wss://openapi-ws-v2.bitmart.com/api
      and the private endpoint is wss://openapi-ws-v2.bitmart.com/user. Up to 500 private connections
      per IP are supported for high-throughput institutional deployments.
  - aid: bitmart:margin-trading-api
    name: BitMart Margin Trading API
    tags:
      - Borrowing
      - Cryptocurrency
      - Leverage
      - Margin
      - Trading
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api-cloud.bitmart.com
    humanURL: https://developer-pro.bitmart.com/en/spot/
    properties:
      - url: https://developer-pro.bitmart.com/en/spot/
        type: Documentation
    description: >-
      The BitMart Margin Trading API provides access to isolated margin trading functionality. Developers
      can submit leveraged buy and sell orders, manage isolated margin accounts, transfer assets between
      spot and margin wallets, borrow and repay loan assets, and query borrow and repayment records. The
      API exposes available margin trading pairs and their parameters, enabling algorithmic margin
      strategies with real-time position management across supported cryptocurrency pairs.
  - aid: bitmart:account-wallet-api
    name: BitMart Account and Wallet API
    tags:
      - Account
      - Cryptocurrency
      - Deposits
      - Wallet
      - Withdrawals
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api-cloud.bitmart.com
    humanURL: https://developer-pro.bitmart.com/en/spot/
    properties:
      - url: https://developer-pro.bitmart.com/en/spot/
        type: Documentation
    description: >-
      The BitMart Account and Wallet API provides programmatic access to funding account management,
      including wallet balance queries, deposit address retrieval, withdrawal application submission,
      and deposit/withdrawal history. Developers can look up available currencies, query withdrawal
      fee estimates, manage pre-verified withdrawal address lists, and retrieve detailed deposit and
      withdrawal transaction records for reconciliation. All sensitive wallet operations require
      SIGNED authentication with a valid API key.
